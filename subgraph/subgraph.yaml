specVersion: 1.0.0
indexerHints:
  prune: auto
schema:
  file: ./schema.graphql
dataSources:
  - kind: ethereum
    name: PetNFT
    network: base
    source:
      address: "0x0000000000000000000000000000000000000000"  # replace after deploy
      abi: PetNFT
      startBlock: 0  # replace with deployment block
    mapping:
      kind: ethereum/events
      apiVersion: 0.0.7
      language: wasm/assemblyscript
      entities:
        - Pet
        - Protocol
      abis:
        - name: PetNFT
          file: ./abis/PetNFT.json
      eventHandlers:
        - event: PetMinted(indexed uint256,indexed address,string)
          handler: handlePetMinted
        - event: Transfer(indexed address,indexed address,indexed uint256)
          handler: handleTransfer
      file: ./src/mappings.ts

  - kind: ethereum
    name: PetMarketplace
    network: base
    source:
      address: "0x0000000000000000000000000000000000000000"  # replace after deploy
      abi: PetMarketplace
      startBlock: 0
    mapping:
      kind: ethereum/events
      apiVersion: 0.0.7
      language: wasm/assemblyscript
      entities:
        - Listing
        - Sale
        - Protocol
      abis:
        - name: PetMarketplace
          file: ./abis/PetMarketplace.json
      eventHandlers:
        - event: Listed(indexed uint256,indexed address,uint256)
          handler: handleListed
        - event: Delisted(indexed uint256,indexed address)
          handler: handleDelisted
        - event: Sold(indexed uint256,indexed address,indexed address,uint256)
          handler: handleSold
      file: ./src/mappings.ts

  - kind: ethereum
    name: USDCVault
    network: base
    source:
      address: "0x0000000000000000000000000000000000000000"  # replace after deploy
      abi: PetVault
      startBlock: 0
    mapping:
      kind: ethereum/events
      apiVersion: 0.0.7
      language: wasm/assemblyscript
      entities:
        - VaultDeposit
        - VaultWithdrawal
        - Protocol
      abis:
        - name: PetVault
          file: ./abis/PetVault.json
      eventHandlers:
        - event: Deposited(indexed uint256,indexed address,uint256)
          handler: handleUsdcDeposited
        - event: Withdrawn(indexed uint256,indexed address,uint256)
          handler: handleUsdcWithdrawn
      file: ./src/mappings.ts

  - kind: ethereum
    name: WETHVault
    network: base
    source:
      address: "0x0000000000000000000000000000000000000000"  # replace after deploy
      abi: PetVault
      startBlock: 0
    mapping:
      kind: ethereum/events
      apiVersion: 0.0.7
      language: wasm/assemblyscript
      entities:
        - VaultDeposit
        - VaultWithdrawal
        - Protocol
      abis:
        - name: PetVault
          file: ./abis/PetVault.json
      eventHandlers:
        - event: Deposited(indexed uint256,indexed address,uint256)
          handler: handleWethDeposited
        - event: Withdrawn(indexed uint256,indexed address,uint256)
          handler: handleWethWithdrawn
      file: ./src/mappings.ts
